<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Site Blocker</title>
  <link rel="stylesheet" href="phase-end.css">
</head>
<body>
  <div class="awning" aria-hidden="true"></div>

  <main class="page">
    <div class="hanging">
      <svg class="hanging__strings" viewBox="0 0 220 90" aria-hidden="true">
        <circle cx="110" cy="8" r="4"/>
        <line x1="110" y1="8" x2="34" y2="90"/>
        <line x1="110" y1="8" x2="186" y2="90"/>
      </svg>
      <section class="sign">
        <h1 class="sign__title" id="phase-title">Break time!</h1>
        <p class="sign__detail" id="phase-detail">Focus session done. The break is running.</p>
        <button class="sign__button" id="carry-on" type="button">Carry on</button>
      </section>
    </div>
  </main>

  <p class="hint">The timer keeps running in the background — watch the toolbar badge.</p>

  <script src="phase-end.js"></script>
</body>
</html>
