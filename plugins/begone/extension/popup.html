<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Begone</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <header class="popup__header">
        <svg class="popup__mark" viewBox="0 0 24 24" aria-hidden="true">
          <rect x="3.5" y="3.5" width="17" height="17" rx="5.5" fill="none" stroke="currentColor" stroke-width="2.4" />
          <path d="M8.8 8.8l6.4 6.4M15.2 8.8l-6.4 6.4" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" />
        </svg>
        <div class="popup__titles">
          <h1 class="popup__title">Begone</h1>
          <p class="popup__tagline">Element remover</p>
        </div>
      </header>
      <form class="popup__form">
        <input
          type="text"
          class="popup__input"
          placeholder=".some-selector"
          autocomplete="off"
          autofocus
        />
        <button type="submit" class="popup__add">Add</button>
      </form>
      <p class="popup__error" hidden></p>
      <ul class="popup__list"></ul>
      <p class="popup__empty" hidden>No selectors yet.</p>
      <footer class="popup__credit">
        <img class="popup__credit-icon" src="pearpages-icon.png" alt="" width="16" height="16" />
        Made by <a href="https://pearpages.com" target="_blank" rel="noopener">pearpages</a>
      </footer>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
